name: Lua Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Lua 5.1
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1

      - name: Run smoke tests
        run: lua5.1 tests/statusstats_spec.lua
