name: Release Package

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Build plugin ZIP
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist/statusstats.koplugin

          shopt -s dotglob nullglob
          for entry in *; do
            case "$entry" in
              .git|.github|tests|dist|.gitignore)
                continue
                ;;
            esac
            cp -R "$entry" dist/statusstats.koplugin/
          done

          (
            cd dist
            zip -r ../statusstats.koplugin.zip statusstats.koplugin
          )

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: statusstats.koplugin.zip
          overwrite_files: true
